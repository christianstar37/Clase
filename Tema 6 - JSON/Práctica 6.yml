---
recipes:
  recipe:
  - name: Spaghetti Bolognese
    ingredients:
    - name: Ground Beef
      quantity: 500g
    - name: Tomato Sauce
      quantity: 400g
    - name: Onion
      quantity: '1'
    - name: Garlic
      quantity: 2 cloves
    - name: Spagghetti
      quantity: 300g
    - name: Olive Oil
      quantity: 2 tablespoon
    - name: Salt
      quantity: To taste
    - name: Black Pepper
      quantity: To taste
    instruction:
    - Cook the spaghetti according to package instructions.
    - Heat olive oil in a pan and sauté chopped onion and minced garlic until golden
      brown.
    - Add ground beef and cook until browned.
    - Pour in tomato sauce and let it simmer for 15 minutes.
    - Season with salt and black pepper to taste.
    - Serve the Bolognese sauce over cooked spaghetti.
  - name: Vegetarian Buddha Bowl
    ingredients:
    - name: Quinoa
      quantity: 1 cup
    - name: Chickpeas
      quantity: 1 can (15 oz)
    - name: Broccoli florets
      quantity: 2 cups
    - name: Carrots
      quantity: 2, julienned
    - name: Avocado
      quantity: 1, sliced
    - name: Cucumbes
      quantity: 1, sliced
    - name: Cherry tomatoes
      quantity: 1 cup
    - name: Hummus
      quantity: 1/2 cup
    - name: Tahini dressing
      quantity: 1/4 cup
    - name: Sesame seeds
      quantity: 1 tablespoon
    instruction:
    - Rinse quinoa and cook according to package instructions.
    - Roast chickpeas with a drizzle of olive oil and your favorite spices until crispy.
    - Steam broccoli florets and julienne carrots.
    - Assemble bowls with cooked quinoa, roasted chickpeas, steamed broccoli, julienned
      carrots, sliced avocado, cucumber, and cherry tomatoes.
    - Drizzle with hummus and tahini dressing.
    - Sprinkle sesame seeds on top for added crunch.
    - Enjoy your nutritious and delicious Vegetarian Buddha Bowl!
